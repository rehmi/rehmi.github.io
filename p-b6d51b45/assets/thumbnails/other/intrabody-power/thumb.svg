<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="s2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0b5cff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="600" height="450" fill="#f6f7f9"/>
  <text x="300" y="52" text-anchor="middle" font-size="27" font-weight="700" fill="#1a1a1a">Intrabody networking</text>
  <text x="300" y="80" text-anchor="middle" font-size="16" fill="#626871">power + data through the body</text>

  <!-- Body -->
  <g stroke-linecap="round" fill="none">
    <line x1="287" y1="196" x2="214" y2="232" stroke="#dbe7ff" stroke-width="13"/>
    <line x1="313" y1="196" x2="386" y2="232" stroke="#dbe7ff" stroke-width="13"/>
    <line x1="292" y1="272" x2="276" y2="332" stroke="#dbe7ff" stroke-width="13"/>
    <line x1="308" y1="272" x2="324" y2="332" stroke="#dbe7ff" stroke-width="13"/>
  </g>
  <rect x="280" y="176" width="40" height="98" rx="16" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
  <circle cx="300" cy="154" r="22" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
  <circle cx="214" cy="232" r="9" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
  <circle cx="386" cy="232" r="9" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>

  <!-- TX -->
  <rect x="104" y="210" width="64" height="44" rx="7" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="136" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">TX</text>
  <line x1="168" y1="232" x2="184" y2="232" stroke="#0b5cff" stroke-width="2"/>
  <line x1="184" y1="220" x2="184" y2="244" stroke="#0b5cff" stroke-width="2.5"/>
  <line x1="194" y1="220" x2="194" y2="244" stroke="#0b5cff" stroke-width="2.5"/>
  <line x1="194" y1="232" x2="214" y2="232" stroke="#0b5cff" stroke-width="2"/>

  <!-- RX -->
  <rect x="432" y="210" width="64" height="44" rx="7" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="464" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">RX</text>
  <line x1="386" y1="232" x2="406" y2="232" stroke="#0b5cff" stroke-width="2"/>
  <line x1="406" y1="220" x2="406" y2="244" stroke="#0b5cff" stroke-width="2.5"/>
  <line x1="416" y1="220" x2="416" y2="244" stroke="#0b5cff" stroke-width="2.5"/>
  <line x1="416" y1="232" x2="432" y2="232" stroke="#0b5cff" stroke-width="2"/>

  <!-- Signal arrows along arms -->
  <line x1="220" y1="229" x2="286" y2="199" stroke="#0b5cff" stroke-width="3" marker-end="url(#s2)"/>
  <line x1="314" y1="199" x2="380" y2="229" stroke="#0b5cff" stroke-width="3" marker-end="url(#s2)"/>

  <!-- Ground -->
  <line x1="90" y1="356" x2="510" y2="356" stroke="#626871" stroke-width="2"/>
  <g stroke="#626871" stroke-width="1.5">
    <line x1="130" y1="356" x2="120" y2="368"/><line x1="190" y1="356" x2="180" y2="368"/>
    <line x1="250" y1="356" x2="240" y2="368"/><line x1="310" y1="356" x2="300" y2="368"/>
    <line x1="370" y1="356" x2="360" y2="368"/><line x1="430" y1="356" x2="420" y2="368"/>
    <line x1="490" y1="356" x2="480" y2="368"/>
  </g>
  <g stroke="#9aa0a6" stroke-width="2" stroke-dasharray="5 5">
    <line x1="136" y1="254" x2="136" y2="356"/>
    <line x1="464" y1="254" x2="464" y2="356"/>
    <line x1="276" y1="336" x2="276" y2="356"/>
    <line x1="324" y1="336" x2="324" y2="356"/>
  </g>
  <text x="300" y="398" text-anchor="middle" font-size="14" fill="#626871">return via ground</text>
</svg>
