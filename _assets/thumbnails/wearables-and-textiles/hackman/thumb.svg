<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="600" height="450" fill="#f6f7f9"/>
  <text x="300" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#1a1a1a">HackMan 0.4</text>
  <text x="300" y="80" text-anchor="middle" font-size="16" fill="#626871">wearable Linux · 1995</text>

  <!-- Cables -->
  <g stroke="#626871" stroke-width="2" fill="none">
    <line x1="178" y1="188" x2="246" y2="214"/>
    <line x1="452" y1="246" x2="366" y2="246"/>
    <line x1="306" y1="322" x2="306" y2="290"/>
  </g>

  <!-- HUD -->
  <circle cx="138" cy="188" r="14" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="152" y="179" width="30" height="17" rx="3" fill="#dbe7ff" stroke="#0b5cff" stroke-width="1.5"/>
  <text x="140" y="158" text-anchor="middle" font-size="13" fill="#626871">HUD</text>

  <!-- Computer -->
  <rect x="246" y="198" width="120" height="92" rx="8" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
  <rect x="264" y="214" width="30" height="22" rx="2" fill="#33383f"/>
  <rect x="300" y="214" width="36" height="22" rx="2" fill="#33383f"/>
  <text x="306" y="258" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">486SL</text>
  <text x="306" y="276" text-anchor="middle" font-size="12.5" fill="#626871">Linux + DOS</text>

  <!-- Twiddler -->
  <rect x="452" y="204" width="50" height="84" rx="16" fill="#e9edf2" stroke="#1a1a1a" stroke-width="1.5"/>
  <g fill="#626871">
    <circle cx="468" cy="226" r="4"/><circle cx="488" cy="226" r="4"/>
    <circle cx="468" cy="246" r="4"/><circle cx="488" cy="246" r="4"/>
    <circle cx="468" cy="266" r="4"/><circle cx="488" cy="266" r="4"/>
  </g>
  <text x="477" y="186" text-anchor="middle" font-size="13" fill="#626871">Twiddler</text>

  <!-- Battery -->
  <rect x="280" y="322" width="52" height="24" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="332" y="329" width="6" height="10" fill="#1a1a1a"/>
  <text x="306" y="339" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">6 V</text>

  <text x="300" y="400" text-anchor="middle" font-size="14" fill="#626871">25 MHz · 8 MB · 1 GB · 615 g</text>
</svg>
