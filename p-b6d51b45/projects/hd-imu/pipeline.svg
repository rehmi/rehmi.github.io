<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="hd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0b5cff"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="468" rx="14" fill="#f6f7f9" stroke="#e4e6ea"/>
  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">High-Definition IMU</text>
  <text x="600" y="70" text-anchor="middle" font-size="15" fill="#626871">hardened wireless inertial nodes → per-stride motion, reconstructed by constrained integration</text>

  <!-- Panel 1: quadruped with limb nodes -->
  <rect x="40" y="110" width="230" height="238" rx="10" fill="#ffffff" stroke="#cfd4da"/>
  <g>
    <ellipse cx="150" cy="205" rx="66" ry="24" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
    <path d="M206 196 L224 168" stroke="#0b5cff" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="232" cy="162" rx="15" ry="10" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
    <path d="M84 194 Q64 206 66 236" fill="none" stroke="#0b5cff" stroke-width="4" stroke-linecap="round"/>
    <line x1="104" y1="226" x2="104" y2="292" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="126" y1="228" x2="126" y2="292" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="176" y1="228" x2="176" y2="292" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="198" y1="226" x2="198" y2="292" stroke="#1a1a1a" stroke-width="4"/>
    <circle cx="104" cy="296" r="6" fill="#0b5cff"/><circle cx="126" cy="296" r="6" fill="#0b5cff"/>
    <circle cx="176" cy="296" r="6" fill="#0b5cff"/><circle cx="198" cy="296" r="6" fill="#0b5cff"/>
    <path d="M206 292 q10 -6 10 -16" fill="none" stroke="#9aa0a6" stroke-width="1.5"/>
    <path d="M212 296 q16 -8 16 -24" fill="none" stroke="#9aa0a6" stroke-width="1.5"/>
  </g>
  <text x="155" y="330" text-anchor="middle" font-size="12.5" fill="#626871">wireless IMU on each limb</text>

  <!-- Panel 2: 3-axis signal -->
  <rect x="343" y="110" width="230" height="238" rx="10" fill="#ffffff" stroke="#cfd4da"/>
  <path d="M360 210 q14 -34 28 0 t28 0 t28 0 t28 0 t28 0 t28 0" fill="none" stroke="#0b5cff" stroke-width="2"/>
  <path d="M360 232 q14 26 28 0 t28 0 t28 0 t28 0 t28 0 t28 0" fill="none" stroke="#2ca05a" stroke-width="2"/>
  <path d="M360 254 q14 -18 28 0 t28 0 t28 0 t28 0 t28 0 t28 0" fill="none" stroke="#c23a3a" stroke-width="2"/>
  <text x="458" y="330" text-anchor="middle" font-size="12.5" fill="#626871">3-axis acceleration + rotation</text>

  <!-- Panel 3: segmented strides -->
  <rect x="646" y="110" width="230" height="238" rx="10" fill="#ffffff" stroke="#cfd4da"/>
  <g stroke="#9aa0a6" stroke-width="1" stroke-dasharray="4 4">
    <line x1="702" y1="150" x2="702" y2="300"/><line x1="761" y1="150" x2="761" y2="300"/><line x1="820" y1="150" x2="820" y2="300"/>
  </g>
  <path d="M672 232 q13 -30 26 0 t26 0 M732 232 q13 -30 26 0 t26 0 M792 232 q13 -30 26 0 t26 0" fill="none" stroke="#0b5cff" stroke-width="2"/>
  <text x="761" y="330" text-anchor="middle" font-size="12.5" fill="#626871">auto-segment into strides</text>

  <!-- Panel 4: reconstructed stride arch -->
  <rect x="949" y="110" width="230" height="238" rx="10" fill="#ffffff" stroke="#cfd4da"/>
  <line x1="969" y1="290" x2="1159" y2="290" stroke="#9aa0a6" stroke-width="1.5"/>
  <path d="M975 290 Q1064 150 1153 290" fill="none" stroke="#0b5cff" stroke-width="2.5"/>
  <circle cx="975" cy="290" r="4" fill="#0b5cff"/><circle cx="1153" cy="290" r="4" fill="#0b5cff"/>
  <text x="1064" y="235" text-anchor="middle" font-size="12" fill="#626871">height ≥ 0</text>
  <text x="1064" y="330" text-anchor="middle" font-size="12.5" fill="#626871">reconstructed stride trajectory</text>

  <!-- Arrows -->
  <text x="306" y="205" text-anchor="middle" font-size="12" fill="#0b5cff">wireless</text>
  <line x1="276" y1="220" x2="337" y2="220" stroke="#0b5cff" stroke-width="2.5" marker-end="url(#hd)"/>
  <text x="609" y="205" text-anchor="middle" font-size="12" fill="#0b5cff">segment</text>
  <line x1="579" y1="220" x2="640" y2="220" stroke="#0b5cff" stroke-width="2.5" marker-end="url(#hd)"/>
  <text x="912" y="205" text-anchor="middle" font-size="12" fill="#0b5cff">integrate</text>
  <line x1="882" y1="220" x2="943" y2="220" stroke="#0b5cff" stroke-width="2.5" marker-end="url(#hd)"/>

  <text x="600" y="452" text-anchor="middle" font-size="13" fill="#626871">Asteism · 2005–2011 · 75–90% of segmented strides retained after filtering, robust to node-placement error</text>
</svg>
