<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="h2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0b5cff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="600" height="450" fill="#f6f7f9"/>
  <text x="300" y="52" text-anchor="middle" font-size="28" font-weight="700" fill="#1a1a1a">High-Definition IMU</text>
  <text x="300" y="80" text-anchor="middle" font-size="16" fill="#626871">wireless gait sensing</text>

  <!-- Quadruped with limb nodes -->
  <g>
    <ellipse cx="165" cy="230" rx="58" ry="21" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
    <path d="M214 222 L232 196" stroke="#0b5cff" stroke-width="9" stroke-linecap="round"/>
    <ellipse cx="240" cy="190" rx="13" ry="9" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
    <path d="M108 220 Q90 232 92 258" fill="none" stroke="#0b5cff" stroke-width="4" stroke-linecap="round"/>
    <line x1="126" y1="248" x2="126" y2="312" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="148" y1="250" x2="148" y2="312" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="188" y1="250" x2="188" y2="312" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="210" y1="248" x2="210" y2="312" stroke="#1a1a1a" stroke-width="4"/>
    <circle cx="126" cy="316" r="7" fill="#0b5cff"/><circle cx="148" cy="316" r="7" fill="#0b5cff"/>
    <circle cx="188" cy="316" r="7" fill="#0b5cff"/><circle cx="210" cy="316" r="7" fill="#0b5cff"/>
  </g>
  <text x="168" y="352" text-anchor="middle" font-size="14" fill="#626871">IMU on each limb</text>

  <!-- Arrow -->
  <text x="300" y="212" text-anchor="middle" font-size="15" font-weight="600" fill="#0b5cff">integrate</text>
  <line x1="256" y1="228" x2="344" y2="228" stroke="#0b5cff" stroke-width="3" marker-end="url(#h2)"/>

  <!-- Reconstructed stride arch -->
  <line x1="372" y1="300" x2="560" y2="300" stroke="#9aa0a6" stroke-width="1.5"/>
  <path d="M380 300 Q466 176 552 300" fill="none" stroke="#0b5cff" stroke-width="3"/>
  <circle cx="380" cy="300" r="5" fill="#0b5cff"/><circle cx="552" cy="300" r="5" fill="#0b5cff"/>
  <text x="466" y="250" text-anchor="middle" font-size="13" fill="#626871">height ≥ 0</text>
  <text x="466" y="352" text-anchor="middle" font-size="14" fill="#626871">stride trajectory</text>
</svg>
