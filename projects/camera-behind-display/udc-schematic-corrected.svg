<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" role="img" aria-label="Plan view of the same under-display camera with a diffractive corrective element at the pupil. The element redirects the display diffraction orders so the lens focuses them back to a single spot, collapsing the point-spread function to a compact point.">
<style>
  text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  .ink{stroke:#20242a;} .inktxt{fill:#20242a;} .fill-ink{fill:#20242a;}
  .muted{stroke:#9099a3;} .mutedtxt{fill:#7c848d;} .fill-muted{fill:#9099a3;}
  .accent{stroke:#b8543a;} .accenttxt{fill:#b8543a;} .fill-accent{fill:#b8543a;}
  .axis{stroke:#b6bdc5;}
  @media (prefers-color-scheme: dark){
    .ink{stroke:#dbe0e6;} .inktxt{fill:#dbe0e6;} .fill-ink{fill:#dbe0e6;}
    .muted{stroke:#79818b;} .mutedtxt{fill:#98a1aa;} .fill-muted{fill:#79818b;}
    .accent{stroke:#e6b48c;} .accenttxt{fill:#e6b48c;} .fill-accent{fill:#e6b48c;}
    .axis{stroke:#3a424b;}
  }
</style>
<defs><marker id="ray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" class="fill-ink"/></marker><marker id="dimhead" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,2.5 L0,5 Z" class="fill-muted"/></marker></defs>
<line x1="40.0" y1="178.0" x2="704.0" y2="178.0" class="axis" stroke-width="1" stroke-dasharray="2 4"/>
<text x="18.0" y="26.0" class="inktxt" text-anchor="start" font-size="13.5" font-weight="600">With corrective diffractive element</text>
<line x1="40.0" y1="130.0" x2="320.0" y2="130.0" class="ink" stroke-width="1.2" marker-end="url(#ray)"/>
<line x1="40.0" y1="178.0" x2="320.0" y2="178.0" class="ink" stroke-width="1.2" marker-end="url(#ray)"/>
<line x1="40.0" y1="226.0" x2="320.0" y2="226.0" class="ink" stroke-width="1.2" marker-end="url(#ray)"/>
<text x="44.0" y="88.0" class="mutedtxt" text-anchor="start" font-size="12.5" font-style="italic">scene at ∞</text>
<text x="181.0" y="122.0" class="mutedtxt" text-anchor="middle" font-size="11.5">collimated input</text>
<line x1="322.0" y1="100.0" x2="322.0" y2="258.0" class="ink" stroke-width="5" stroke-dasharray="10 7"/>
<text x="322.0" y="280.0" class="inktxt" text-anchor="middle" font-size="12.5">OLED display</text>
<text x="322.0" y="295.0" class="mutedtxt" text-anchor="middle" font-size="11">(periodic aperture)</text>
<path d="M 320,92 L 320,88 L 337,88 L 337,92" class="muted" stroke-width="1" fill="none"/>
<text x="328.5" y="83.0" class="mutedtxt" text-anchor="middle" font-size="13">Λ</text>
<line x1="686.0" y1="126.0" x2="686.0" y2="230.0" class="ink" stroke-width="4.5"/>
<text x="686.0" y="280.0" class="inktxt" text-anchor="middle" font-size="12.5">sensor</text>
<path d="M 452,122 Q 464,178 452,234 Q 440,178 452,122 Z" class="ink" stroke-width="1.6" fill="none"/>
<text x="462.0" y="280.0" class="inktxt" text-anchor="middle" font-size="12.5">lens</text>
<line x1="322.0" y1="124.0" x2="400.0" y2="124.0" class="ink" stroke-width="0.9"/>
<line x1="322.0" y1="178.0" x2="400.0" y2="178.0" class="ink" stroke-width="0.9"/>
<line x1="322.0" y1="232.0" x2="400.0" y2="232.0" class="ink" stroke-width="0.9"/>
<line x1="400.0" y1="118.0" x2="400.0" y2="238.0" class="accent" stroke-width="4.5"/>
<path d="M 374,120 l 7,-9 l 0,9 l 7,-9 l 0,9 l 7,-9 l 0,9" class="accent" stroke-width="1.1" fill="none"/>
<text x="400.0" y="96.0" class="accenttxt" text-anchor="middle" font-size="11.5">corrective element</text>
<text x="400.0" y="109.0" class="accenttxt" text-anchor="middle" font-size="10.5">phase φ(u,v)</text>
<line x1="400.0" y1="124.0" x2="686.0" y2="178.0" class="accent" stroke-width="1.1"/>
<line x1="400.0" y1="178.0" x2="686.0" y2="178.0" class="accent" stroke-width="1.1"/>
<line x1="400.0" y1="232.0" x2="686.0" y2="178.0" class="accent" stroke-width="1.1"/>
<circle cx="686.0" cy="178.0" r="5.8" class="fill-accent"/>
<text x="695.0" y="182.0" class="accenttxt" text-anchor="start" font-size="11">single peak</text>
<line x1="400.0" y1="290.0" x2="452.0" y2="290.0" class="muted" stroke-width="1" marker-start="url(#dimhead)" marker-end="url(#dimhead)"/><text x="426.0" y="285.0" class="mutedtxt" text-anchor="middle" font-size="12.5">s</text>
<line x1="322.0" y1="308.0" x2="452.0" y2="308.0" class="muted" stroke-width="1" marker-start="url(#dimhead)" marker-end="url(#dimhead)"/><text x="387.0" y="323.0" class="mutedtxt" text-anchor="middle" font-size="12.5">d   (≪ f)</text>
<line x1="452.0" y1="308.0" x2="686.0" y2="308.0" class="muted" stroke-width="1" marker-start="url(#dimhead)" marker-end="url(#dimhead)"/><text x="569.0" y="323.0" class="mutedtxt" text-anchor="middle" font-size="12.5">f</text>
<text x="380.0" y="335.0" class="accenttxt" text-anchor="middle" font-size="12">corrector recombines the orders → PSF collapses to a point</text>
</svg>
