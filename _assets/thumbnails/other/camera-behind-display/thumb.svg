<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="tblur" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="4"/></filter>
    <marker id="tarrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0b5cff"/>
    </marker>
    <g id="rings">
      <circle r="28" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle r="52" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle r="74" fill="none" stroke="currentColor" stroke-width="3"/>
      <line x1="-74" y1="0" x2="74" y2="0" stroke="currentColor" stroke-width="3"/>
      <line x1="0" y1="-74" x2="0" y2="74" stroke="currentColor" stroke-width="3"/>
    </g>
  </defs>

  <rect x="0" y="0" width="600" height="450" fill="#f6f7f9"/>
  <text x="300" y="56" text-anchor="middle" font-size="27" font-weight="700" fill="#1a1a1a">Under-display camera</text>
  <text x="300" y="82" text-anchor="middle" font-size="16" fill="#626871">PSF deconvolution</text>

  <!-- Left: behind display (blurred + grid) -->
  <rect x="40" y="120" width="200" height="200" rx="10" fill="#ffffff" stroke="#cfd4da"/>
  <g transform="translate(140,220)" color="#1a1a1a" filter="url(#tblur)"><use href="#rings"/></g>
  <g stroke="#9aa0a6" stroke-width="1" opacity="0.45">
    <line x1="70" y1="120" x2="70" y2="320"/><line x1="105" y1="120" x2="105" y2="320"/>
    <line x1="140" y1="120" x2="140" y2="320"/><line x1="175" y1="120" x2="175" y2="320"/>
    <line x1="210" y1="120" x2="210" y2="320"/>
    <line x1="40" y1="155" x2="240" y2="155"/><line x1="40" y1="190" x2="240" y2="190"/>
    <line x1="40" y1="225" x2="240" y2="225"/><line x1="40" y1="260" x2="240" y2="260"/>
    <line x1="40" y1="295" x2="240" y2="295"/>
  </g>

  <!-- Right: restored -->
  <rect x="360" y="120" width="200" height="200" rx="10" fill="#ffffff" stroke="#cfd4da"/>
  <g transform="translate(460,220)" color="#0b5cff"><use href="#rings"/></g>

  <!-- Arrow -->
  <text x="300" y="205" text-anchor="middle" font-size="15" font-weight="600" fill="#0b5cff">deconvolve</text>
  <line x1="255" y1="220" x2="345" y2="220" stroke="#0b5cff" stroke-width="3" marker-end="url(#tarrow)"/>

  <text x="140" y="352" text-anchor="middle" font-size="15" fill="#626871">behind display</text>
  <text x="460" y="352" text-anchor="middle" font-size="15" fill="#626871">restored</text>
</svg>
