<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="tt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0b5cff"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="468" rx="14" fill="#f6f7f9" stroke="#e4e6ea"/>

  <text x="600" y="44" text-anchor="middle" font-size="27" font-weight="700" fill="#1a1a1a">TriboTouch</text>
  <text x="600" y="70" text-anchor="middle" font-size="15" fill="#626871">triboelectric charge-displacement touch sensing</text>
  <text x="600" y="92" text-anchor="middle" font-size="13" fill="#0b5cff">a single passive electrode — senses conductors and insulators alike</text>

  <!-- Contact object descending onto the surface -->
  <rect x="350" y="140" width="60" height="130" rx="26" fill="#e9edf2" stroke="#626871" stroke-width="1.5"/>
  <text x="380" y="130" text-anchor="middle" font-size="13" fill="#1a1a1a">contact</text>
  <text x="380" y="118" text-anchor="middle" font-size="11.5" fill="#626871">finger · glove · stylus</text>

  <!-- Triboelectric charge separation at the contact -->
  <text x="352" y="262" font-size="16" font-weight="700" fill="#c23a3a">+ + +</text>
  <text x="352" y="304" font-size="16" font-weight="700" fill="#0b5cff">− − −</text>
  <text x="470" y="250" font-size="12.5" fill="#626871">contact charge (triboelectric)</text>

  <!-- Sensing surface / electrode -->
  <line x1="200" y1="286" x2="720" y2="286" stroke="#9aa0a6" stroke-width="1.5"/>
  <rect x="200" y="288" width="520" height="18" rx="4" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
  <text x="360" y="332" text-anchor="middle" font-size="12.5" fill="#626871">sensing surface — single electrode (no drive signal)</text>

  <!-- Charge readout path -->
  <text x="648" y="282" text-anchor="middle" font-size="15" font-weight="600" fill="#0b5cff">Δq</text>
  <polyline points="660,306 660,362 704,362" fill="none" stroke="#0b5cff" stroke-width="2.5" marker-end="url(#tt)"/>
  <rect x="712" y="338" width="120" height="48" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="772" y="367" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">charge amp</text>
  <line x1="832" y1="362" x2="866" y2="362" stroke="#0b5cff" stroke-width="2.5" marker-end="url(#tt)"/>

  <!-- Signal readout -->
  <rect x="874" y="330" width="150" height="64" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <polyline points="886,378 916,378 928,346 946,346 958,378 1012,378" fill="none" stroke="#0b5cff" stroke-width="2"/>
  <text x="949" y="418" text-anchor="middle" font-size="12.5" fill="#626871">touch / proximity signal</text>

  <!-- Dual-mode note -->
  <text x="600" y="452" text-anchor="middle" font-size="13" fill="#626871">passive · dual-mode: contact → charge displacement, hover → ambient-field change</text>
</svg>
