<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 490" width="1200" height="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="sig" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0b5cff"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="488" rx="14" fill="#f6f7f9" stroke="#e4e6ea"/>

  <text x="600" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Body-coupled communication</text>
  <text x="600" y="68" text-anchor="middle" font-size="15" fill="#626871">moving data and power through the body — no antenna, no wires</text>
  <text x="600" y="90" text-anchor="middle" font-size="13" fill="#0b5cff">MIT Media Lab, 1997 → Samsung, 2023</text>

  <!-- Body (the conductor) -->
  <g stroke="#0b5cff" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9">
    <line x1="576" y1="204" x2="432" y2="252" stroke="#dbe7ff"/>
    <line x1="624" y1="204" x2="768" y2="252" stroke="#dbe7ff"/>
    <line x1="588" y1="326" x2="560" y2="410" stroke="#dbe7ff"/>
    <line x1="612" y1="326" x2="640" y2="410" stroke="#dbe7ff"/>
  </g>
  <rect x="568" y="176" width="64" height="152" rx="24" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
  <circle cx="600" cy="148" r="30" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
  <circle cx="432" cy="252" r="13" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
  <circle cx="768" cy="252" r="13" fill="#dbe7ff" stroke="#0b5cff" stroke-width="2"/>
  <text x="600" y="262" text-anchor="middle" font-size="13" fill="#0b5cff" font-weight="600">body</text>

  <!-- TX device + capacitive gap -->
  <rect x="300" y="226" width="84" height="52" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="342" y="258" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">TX</text>
  <line x1="384" y1="252" x2="402" y2="252" stroke="#0b5cff" stroke-width="2"/>
  <line x1="402" y1="238" x2="402" y2="266" stroke="#0b5cff" stroke-width="2.5"/>
  <line x1="414" y1="238" x2="414" y2="266" stroke="#0b5cff" stroke-width="2.5"/>
  <line x1="414" y1="252" x2="432" y2="252" stroke="#0b5cff" stroke-width="2"/>
  <text x="342" y="300" text-anchor="middle" font-size="12" fill="#626871">transmit electrode</text>

  <!-- RX device + capacitive gap -->
  <rect x="816" y="226" width="84" height="52" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="858" y="258" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">RX</text>
  <line x1="768" y1="252" x2="786" y2="252" stroke="#0b5cff" stroke-width="2"/>
  <line x1="786" y1="238" x2="786" y2="266" stroke="#0b5cff" stroke-width="2.5"/>
  <line x1="798" y1="238" x2="798" y2="266" stroke="#0b5cff" stroke-width="2.5"/>
  <line x1="798" y1="252" x2="816" y2="252" stroke="#0b5cff" stroke-width="2"/>
  <text x="858" y="300" text-anchor="middle" font-size="12" fill="#626871">receive electrode</text>

  <!-- Signal flow arrows along the arms -->
  <line x1="440" y1="248" x2="572" y2="206" stroke="#0b5cff" stroke-width="3" marker-end="url(#sig)"/>
  <line x1="628" y1="206" x2="760" y2="248" stroke="#0b5cff" stroke-width="3" marker-end="url(#sig)"/>

  <!-- Ground plane -->
  <line x1="150" y1="432" x2="1050" y2="432" stroke="#626871" stroke-width="2"/>
  <g stroke="#626871" stroke-width="1.5">
    <line x1="180" y1="432" x2="168" y2="446"/><line x1="240" y1="432" x2="228" y2="446"/>
    <line x1="300" y1="432" x2="288" y2="446"/><line x1="360" y1="432" x2="348" y2="446"/>
    <line x1="420" y1="432" x2="408" y2="446"/><line x1="480" y1="432" x2="468" y2="446"/>
    <line x1="540" y1="432" x2="528" y2="446"/><line x1="600" y1="432" x2="588" y2="446"/>
    <line x1="660" y1="432" x2="648" y2="446"/><line x1="720" y1="432" x2="708" y2="446"/>
    <line x1="780" y1="432" x2="768" y2="446"/><line x1="840" y1="432" x2="828" y2="446"/>
    <line x1="900" y1="432" x2="888" y2="446"/><line x1="960" y1="432" x2="948" y2="446"/>
    <line x1="1020" y1="432" x2="1008" y2="446"/>
  </g>

  <!-- Capacitive return through ground (dashed) -->
  <g stroke="#9aa0a6" stroke-width="2" stroke-dasharray="5 5" fill="none">
    <path d="M342 278 L342 432"/>
    <path d="M858 278 L858 432"/>
    <path d="M560 414 L560 432"/>
    <path d="M640 414 L640 432"/>
  </g>
  <text x="600" y="470" text-anchor="middle" font-size="13" fill="#626871">return path: capacitive coupling to ground</text>
</svg>
