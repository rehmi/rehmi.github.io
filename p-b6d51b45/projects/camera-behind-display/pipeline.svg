<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="psfblur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.6"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0b5cff"/>
    </marker>
    <g id="target">
      <circle r="34" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle r="62" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle r="88" fill="none" stroke="currentColor" stroke-width="3"/>
      <line x1="-88" y1="0" x2="88" y2="0" stroke="currentColor" stroke-width="3"/>
      <line x1="0" y1="-88" x2="0" y2="88" stroke="currentColor" stroke-width="3"/>
    </g>
  </defs>

  <rect x="1" y="1" width="1198" height="468" rx="14" fill="#f6f7f9" stroke="#e4e6ea"/>

  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Camera behind the display</text>
  <text x="600" y="72" text-anchor="middle" font-size="15" fill="#626871">restoring images blurred by the display's point-spread function</text>

  <!-- Panel A: scene (sharp) -->
  <rect x="60" y="100" width="240" height="240" rx="10" fill="#ffffff" stroke="#cfd4da"/>
  <g transform="translate(180,220)" color="#1a1a1a"><use href="#target"/></g>

  <!-- Panel B: behind-display capture (blurred + display grid) -->
  <rect x="480" y="100" width="240" height="240" rx="10" fill="#ffffff" stroke="#cfd4da"/>
  <g transform="translate(600,220)" color="#1a1a1a" filter="url(#psfblur)"><use href="#target"/></g>
  <g stroke="#9aa0a6" stroke-width="1" opacity="0.45">
    <line x1="504" y1="100" x2="504" y2="340"/><line x1="528" y1="100" x2="528" y2="340"/>
    <line x1="552" y1="100" x2="552" y2="340"/><line x1="576" y1="100" x2="576" y2="340"/>
    <line x1="600" y1="100" x2="600" y2="340"/><line x1="624" y1="100" x2="624" y2="340"/>
    <line x1="648" y1="100" x2="648" y2="340"/><line x1="672" y1="100" x2="672" y2="340"/>
    <line x1="696" y1="100" x2="696" y2="340"/>
    <line x1="480" y1="124" x2="720" y2="124"/><line x1="480" y1="148" x2="720" y2="148"/>
    <line x1="480" y1="172" x2="720" y2="172"/><line x1="480" y1="196" x2="720" y2="196"/>
    <line x1="480" y1="220" x2="720" y2="220"/><line x1="480" y1="244" x2="720" y2="244"/>
    <line x1="480" y1="268" x2="720" y2="268"/><line x1="480" y1="292" x2="720" y2="292"/>
    <line x1="480" y1="316" x2="720" y2="316"/>
  </g>

  <!-- Panel C: restored (sharp, accent) -->
  <rect x="900" y="100" width="240" height="240" rx="10" fill="#ffffff" stroke="#cfd4da"/>
  <g transform="translate(1020,220)" color="#0b5cff"><use href="#target"/></g>

  <!-- Arrow 1: through the display -->
  <text x="390" y="196" text-anchor="middle" font-size="14" fill="#626871">through OLED display</text>
  <line x1="312" y1="220" x2="464" y2="220" stroke="#0b5cff" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Arrow 2: deconvolution -->
  <text x="810" y="196" text-anchor="middle" font-size="14" font-weight="600" fill="#0b5cff">deconvolution</text>
  <text x="810" y="252" text-anchor="middle" font-size="13" fill="#626871">measured PSF</text>
  <line x1="732" y1="220" x2="884" y2="220" stroke="#0b5cff" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Panel labels -->
  <text x="180" y="376" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Scene</text>
  <text x="600" y="376" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Behind-display capture</text>
  <text x="600" y="398" text-anchor="middle" font-size="13" fill="#626871">display PSF blur</text>
  <text x="1020" y="376" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Restored image</text>
</svg>
